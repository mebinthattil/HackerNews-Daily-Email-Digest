<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{ month_name }} {{ year }} Archives - HackerNews Digest</title>
    <meta name="description" content="Browse HackerNews Digest editions from {{ month_name }} {{ year }}.">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <main class="container archive-container">
        <a href="/archives/{{ year }}" class="back-link">← Back to {{ year }}</a>

        <h1>{{ month_name }} {{ year }}</h1>
        <p class="tagline">Daily digests from this month.</p>

        {% if digests %}
        <ul class="archive-list">
            {% for archive in digests %}
            <li class="archive-item">
                <a href="{{ archive.url }}" class="archive-link">
                    <span class="archive-date">{{ archive.display_date }}</span>
                    <span class="archive-arrow">→</span>
                </a>
            </li>
            {% endfor %}
        </ul>
        {% else %}
        <p class="archive-empty">No archived digests found for this month.</p>
        {% endif %}

        <div class="opensource">
            <p class="opensource-desc">
                <a href="/" class="home-link">Subscribe to get daily digests →</a>
            </p>
        </div>
    </main>
</body>

</html>
