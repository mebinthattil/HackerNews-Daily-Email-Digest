<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{ year }} Archives - HackerNews Digest</title>
    <meta name="description" content="Browse HackerNews Digest editions from {{ year }}.">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <main class="container archive-container">
        <a href="/archives" class="back-link">← Back to Years</a>

        <h1>{{ year }} Archive</h1>
        <p class="tagline">Browse months from {{ year }}.</p>

        {% if months %}
        <ul class="archive-list">
            {% for month in months %}
            <li class="archive-item">
                <a href="/archives/{{ year }}/{{ month.num }}" class="archive-link">
                    <span class="archive-date">{{ month.name }}</span>
                    <span class="archive-arrow">→</span>
                </a>
            </li>
            {% endfor %}
        </ul>
        {% else %}
        <p class="archive-empty">No archived digests found for this year.</p>
        {% endif %}

        <div class="opensource">
            <p class="opensource-desc">
                <a href="/" class="home-link">Subscribe to get daily digests →</a>
            </p>
        </div>
    </main>
</body>

</html>
